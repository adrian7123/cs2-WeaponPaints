name: weapons_skins

services:
  weapons_skins:
    build: .
    environment:
      - TOKEN=${TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_DOMAIN_NAME=${STEAM_DOMAIN_NAME}
      - STEAM_LOGOUT_PAGE=${STEAM_LOGOUT_PAGE}
      - STEAM_LOGIN_PAGE=${STEAM_LOGIN_PAGE}
    ports:
      - 8080:80
